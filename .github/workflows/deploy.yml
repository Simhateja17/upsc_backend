name: Deploy Backend

on:
  push:
    branches: [main]

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm install

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Type-check (lint)
        run: npm run lint

      - name: Build
        run: npm run build

  deploy:
    needs: quality-gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync files to EC2
        uses: burnett01/rsync-deployments@6.0.0
        with:
          switches: -avzr --delete --exclude='.git' --exclude='node_modules' --exclude='.env' --exclude='dist' --exclude='*.dump'
          path: .
          remote_path: /var/www/backend
          remote_host: ${{ secrets.BACKEND_EC2_HOST }}
          remote_user: ubuntu
          remote_key: ${{ secrets.BACKEND_EC2_SSH_KEY }}

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.BACKEND_EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.BACKEND_EC2_SSH_KEY }}
          script: |
            bash /var/www/backend/deploy/2-deploy.sh
